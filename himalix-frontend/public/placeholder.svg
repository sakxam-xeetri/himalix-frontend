<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a" />
      <stop offset="100%" stop-color="#0d0d0d" />
    </linearGradient>
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a017" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <!-- Grid Pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#333333" stroke-width="0.5" opacity="0.4" />
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  <!-- Grid Overlay -->
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <!-- Stylized Decorative Circle -->
  <circle cx="200" cy="190" r="70" fill="none" stroke="url(#accentGrad)" stroke-width="1" stroke-dasharray="6 4" opacity="0.3" />
  
  <!-- Tech / Image Icon Group -->
  <g transform="translate(160, 150)" stroke="url(#accentGrad)" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- Image Box -->
    <rect x="5" y="10" width="70" height="50" rx="3" />
    <!-- Peaks / Mountains -->
    <path d="M 12 50 L 32 30 L 48 45 L 56 37 L 68 50" />
    <!-- Sun -->
    <circle cx="52" cy="23" r="4" fill="url(#accentGrad)" />
  </g>
  
  <!-- Text Info -->
  <text x="200" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#888888" letter-spacing="1.5" text-anchor="middle">
    NO IMAGE AVAILABLE
  </text>
  <text x="200" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#555555" letter-spacing="1" text-anchor="middle">
    HIMALIX LABS
  </text>
</svg>
